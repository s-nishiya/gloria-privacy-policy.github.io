<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gloria</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
    body {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen py-10 px-4 sm:px-6 flex items-center justify-center selection:bg-slate-200 selection:text-slate-900">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden text-center p-10 my-8">
    
    <!-- Hero / Logos -->
    <div class="flex flex-col items-center justify-center space-y-6 mb-12">
      <img src="./assets/app-logo.png" alt="Gloria Logo" class="w-28 h-28 sm:w-32 sm:h-32 object-contain drop-shadow-sm rounded-3xl">
      <img src="./assets/app-title.png" alt="Gloria Title" class="h-9 sm:h-10 object-contain">
    </div>

    <!-- Links -->
    <div class="space-y-4">
      <a href="terms.html" class="group flex items-center justify-between p-5 rounded-2xl bg-white border-2 border-slate-100 hover:border-slate-300 hover:shadow-sm transition-all duration-200 ease-out">
        <div class="flex items-center space-x-4">
          <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-500 group-hover:bg-slate-900 group-hover:text-white transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
          </div>
          <span class="font-bold text-slate-800 group-hover:text-slate-900">利用規約</span>
        </div>
        <svg class="w-5 h-5 text-slate-400 group-hover:text-slate-600 transform group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
      </a>

      <a href="privacy.html" class="group flex items-center justify-between p-5 rounded-2xl bg-white border-2 border-slate-100 hover:border-slate-300 hover:shadow-sm transition-all duration-200 ease-out">
        <div class="flex items-center space-x-4">
          <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-500 group-hover:bg-slate-900 group-hover:text-white transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          </div>
          <span class="font-bold text-slate-800 group-hover:text-slate-900">プライバシーポリシー</span>
        </div>
        <svg class="w-5 h-5 text-slate-400 group-hover:text-slate-600 transform group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
      </a>
    </div>
    
  </div>
</body>
</html>
